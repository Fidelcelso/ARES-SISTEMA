<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARES - Sistema de Inteligencia</title>
    <style>
        body {
            background-color: #050a0f;
            color: #00d4ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle, #0a192f 0%, #050a0f 100%);
        }
        .container {
            width: 90%;
            max-width: 600px;
            background: rgba(10, 25, 47, 0.8);
            border: 2px solid #00d4ff;
            box-shadow: 0 0 20px #00d4ff;
            padding: 20px;
            border-radius: 10px;
        }
        h1 { text-align: center; letter-spacing: 5px; text-shadow: 0 0 10px #00d4ff; }
        #chat-box {
            height: 300px;
            overflow-y: auto;
            border-bottom: 1px solid #00d4ff;
            margin-bottom: 20px;
            padding: 10px;
        }
        .msg { margin: 10px 0; }
        .fidel { color: #fff; }
        .ares { color: #00d4ff; font-weight: bold; }
        input {
            width: 75%;
            background: transparent;
            border: 1px solid #00d4ff;
            color: #fff;
            padding: 10px;
            outline: none;
        }
        button {
            width: 20%;
            background: #00d4ff;
            color: #050a0f;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
    </style>
</head>
<body>
    <div id="matrix-bg"></div>
    <div class="container">
        <h1>SISTEMA ARES</h1>
        <div id="chat-box">
            <div class="msg ares">ARES: Sistema en línea. Esperando órdenes, Fidel.</div>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <input type="text" id="user-input" placeholder="Escriba comando..." onkeypress="handleKey(event)">
            <button onclick="sendMessage()">ENVIAR</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            if (!input.value) return;

            chatBox.innerHTML += `<div class="msg fidel">FIDEL: ${input.value}</div>`;
            const message = input.value;
            input.value = "";

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            chatBox.innerHTML += `<div class="msg ares">ARES: ${data.response}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>
